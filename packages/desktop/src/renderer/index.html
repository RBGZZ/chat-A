<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>和小雪聊天</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header id="topbar">
      <div class="title">
        <span id="name">小雪</span>
        <span id="provider" class="muted"></span>
      </div>
      <div class="status">
        <span id="state" class="state idle">空闲</span>
        <span id="mood" class="mood muted"></span>
      </div>
    </header>

    <main id="messages" aria-live="polite"></main>

    <section id="clone" aria-label="复刻小雪声音">
      <div class="clone-head">
        <span class="clone-title">复刻小雪声音</span>
        <span id="clone-hint" class="muted">选一段约 15 秒的清晰录音，一键复刻成小雪的专属声音</span>
      </div>
      <div class="clone-row">
        <input id="clone-file" type="file" accept="audio/*" />
        <button id="clone-go" type="button" disabled>复刻</button>
      </div>
      <div id="clone-status" class="clone-status muted"></div>
    </section>

    <!-- —— 人格自定义(代理C) —— 名字 + 三档情绪旋钮;不含语种(语种与人格 dials 正交) -->
    <section id="persona" aria-label="自定义小雪人格">
      <div class="persona-head">
        <span class="persona-title">小雪的人格</span>
        <span class="muted">改名字与三档脾性，保存后立即生效（长期记忆保留）</span>
      </div>
      <div class="persona-row">
        <label for="persona-name">名字</label>
        <input id="persona-name" type="text" maxlength="20" placeholder="小雪" />
      </div>
      <div class="persona-row">
        <label for="persona-warmth">温暖</label>
        <input id="persona-warmth" type="range" min="0" max="1" step="0.05" value="0.6" />
        <span id="persona-warmth-val" class="persona-val">0.60</span>
      </div>
      <div class="persona-row">
        <label for="persona-expressiveness">表达</label>
        <input id="persona-expressiveness" type="range" min="0" max="1" step="0.05" value="0.5" />
        <span id="persona-expressiveness-val" class="persona-val">0.50</span>
      </div>
      <div class="persona-row">
        <label for="persona-volatility">波动</label>
        <input id="persona-volatility" type="range" min="0" max="1" step="0.05" value="0.5" />
        <span id="persona-volatility-val" class="persona-val">0.50</span>
      </div>
      <div class="persona-foot">
        <button id="persona-save" type="button">保存人格</button>
        <span id="persona-status" class="muted"></span>
      </div>
    </section>

    <!-- 记忆查看 / 设置面板(代理D):只读展示,默认收起,点标题按钮展开/刷新 -->
    <section id="memory" aria-label="小雪的记忆" hidden>
      <div class="panel-head">
        <span class="panel-title">小雪的记忆</span>
        <button id="memory-refresh" type="button" class="link-btn">刷新</button>
      </div>
      <ul id="memory-list" class="memory-list"></ul>
      <div id="memory-empty" class="muted" hidden>还没有记下什么——多聊聊就有了。</div>
    </section>

    <section id="settings" aria-label="当前设置" hidden>
      <div class="panel-head">
        <span class="panel-title">当前设置</span>
      </div>
      <dl class="settings-list">
        <dt>对话模型</dt>
        <dd id="set-provider" class="muted">—</dd>
        <dt>模型</dt>
        <dd id="set-model" class="muted">—</dd>
        <dt>记忆后端</dt>
        <dd id="set-memory" class="muted">—</dd>
        <!-- 语音输出语种(可写):小雪语音模式说话的语言;与显示文字语种、输入语种、音色正交 -->
        <dt>语音输出语种</dt>
        <dd>
          <select id="set-output-lang">
            <option value="">自动</option>
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
          </select>
          <span id="set-output-lang-status" class="muted"></span>
        </dd>
        <!-- 音频设备(可写):麦克风/扬声器;变更即写回 .env.local,下次语音启动生效 -->
        <dt>麦克风</dt>
        <dd>
          <select id="audio-input-select"></select>
        </dd>
        <dt>扬声器</dt>
        <dd>
          <select id="audio-output-select"></select>
        </dd>
      </dl>
    </section>

    <!-- 语言面板(本批次):显示/合成/复刻三独立语种 + 朗读开关;默认收起,点「语言」展开 -->
    <section id="lang" aria-label="语言与朗读" hidden>
      <div class="panel-head">
        <span class="panel-title">语言与朗读</span>
        <label class="speak-switch" title="朗读小雪的文字回复">
          <input id="speak-toggle" type="checkbox" />
          <span>朗读</span>
        </label>
      </div>
      <div id="speak-hint" class="muted"></div>
      <div class="lang-row">
        <label for="lang-display">显示文字</label>
        <select id="lang-display">
          <option value="">自动</option>
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
        </select>
      </div>
      <div class="lang-row">
        <label for="lang-tts">朗读语言</label>
        <select id="lang-tts">
          <option value="follow">跟随显示</option>
          <option value="">自动</option>
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
        </select>
      </div>
      <div class="lang-row">
        <label for="lang-clone-ref">复刻录音语言</label>
        <select id="lang-clone-ref">
          <option value="">不指定</option>
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
        </select>
      </div>
      <div id="lang-status" class="muted"></div>
    </section>

    <footer id="composer">
      <button id="voice" type="button" title="语音对话">🎙</button>
      <textarea id="input" rows="1" placeholder="和小雪说点什么…(Enter 发送，Shift+Enter 换行)"></textarea>
      <button id="send" type="button">发送</button>
      <!-- 代理D:换段对话 + 面板开关 -->
      <button id="reset" type="button" class="ghost-btn" title="换一段新对话（长期记忆仍保留）">换段对话</button>
      <button id="memory-toggle" type="button" class="ghost-btn" title="查看小雪的记忆">记忆</button>
      <button id="settings-toggle" type="button" class="ghost-btn" title="查看当前设置">设置</button>
      <button id="lang-toggle" type="button" class="ghost-btn" title="语言与朗读设置">语言</button>
    </footer>

    <script src="./renderer.js"></script>
  </body>
</html>
